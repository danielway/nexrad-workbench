<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="NEXRAD Workbench — clean phosphor N">
  <defs>
    <linearGradient id="A1-bz" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="50%" stop-color="#18181c"/>
      <stop offset="100%" stop-color="#0a0a0d"/>
    </linearGradient>
    <radialGradient id="A1-crt" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#2a1805"/>
      <stop offset="70%" stop-color="#120a02"/>
      <stop offset="100%" stop-color="#050200"/>
    </radialGradient>
    <filter id="A1-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" in="SourceGraphic" result="b1"/>
      <feGaussianBlur stdDeviation="10" in="SourceGraphic" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="A1-clip"><circle cx="128" cy="128" r="86"/></clipPath>
  </defs>

  <rect width="256" height="256" rx="28" fill="url(#A1-bz)"/>
  <rect x="6" y="6" width="244" height="244" rx="24" fill="none" stroke="#3a3a40"/>
  <g fill="#0a0a0d" stroke="#4a4a50">
    <circle cx="22" cy="22" r="5"/><circle cx="234" cy="22" r="5"/>
    <circle cx="22" cy="234" r="5"/><circle cx="234" cy="234" r="5"/>
  </g>
  <g stroke="#2a2a2e" stroke-width="1.2" stroke-linecap="round">
    <line x1="19" y1="19" x2="25" y2="25"/><line x1="231" y1="19" x2="237" y2="25"/>
    <line x1="19" y1="231" x2="25" y2="237"/><line x1="231" y1="231" x2="237" y2="237"/>
  </g>

  <rect x="24" y="24" width="208" height="208" rx="14" fill="#0c0a08"/>
  <circle cx="128" cy="128" r="92" fill="#000"/>
  <circle cx="128" cy="128" r="88" fill="url(#A1-crt)" stroke="#3a2510"/>

  <g clip-path="url(#A1-clip)">
    <g fill="none" stroke="#ff9b2e" stroke-opacity="0.22" stroke-width="1">
      <circle cx="128" cy="128" r="22"/>
      <circle cx="128" cy="128" r="44"/>
      <circle cx="128" cy="128" r="66"/>
      <circle cx="128" cy="128" r="86"/>
    </g>
    <g stroke="#ff9b2e" stroke-opacity="0.16">
      <line x1="42" y1="128" x2="214" y2="128"/>
      <line x1="128" y1="42" x2="128" y2="214"/>
    </g>

    <!-- Symmetric N: diagonal now fully overlaps both verticals at their respective corners -->
    <g filter="url(#A1-glow)" fill="#ffc066">
      <rect x="78" y="74" width="22" height="108" rx="1"/>
      <rect x="156" y="74" width="22" height="108" rx="1"/>
      <polygon points="78,74 100,74 178,182 156,182"/>
    </g>

    <g stroke="#000" stroke-opacity="0.2">
      <line x1="42" y1="80" x2="214" y2="80"/>
      <line x1="42" y1="112" x2="214" y2="112"/>
      <line x1="42" y1="144" x2="214" y2="144"/>
      <line x1="42" y1="176" x2="214" y2="176"/>
    </g>
  </g>

  <circle cx="218" cy="38" r="3" fill="#ff9b2e"/>
  <circle cx="218" cy="38" r="5.5" fill="none" stroke="#ff9b2e" stroke-opacity="0.4"/>
</svg>
