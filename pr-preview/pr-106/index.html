<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <!-- viewport-fit=cover lets the canvas extend into the iPhone safe areas
         (notch, home indicator) when installed as a home-screen PWA. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXRAD Workbench</title>

    <!-- Browser favicon. SVG is live-recolored by `setFaviconColor` (see below) to
         track the app's current AppMode. iOS/Safari and other contexts that can't
         render SVG favicons or update dynamically get the baked orange PNG. -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="assets/manifest.webmanifest">
    <meta name="theme-color" content="#ff9b2e">

    <!-- iOS "Add to Home Screen" PWA metadata. The manifest's display:standalone
         covers modern browsers, but iOS Safari still reads these legacy tags to
         decide whether to launch without Safari chrome and how to style the
         status bar. `black-translucent` lets the app paint under the status bar
         together with viewport-fit=cover above. -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEXRAD">

    
<script type="module">
import init, * as bindings from '/nexrad-workbench/pr-preview/pr-106/nexrad-workbench-29839c295955e4f8.js';
const wasm = await init({ module_or_path: '/nexrad-workbench/pr-preview/pr-106/nexrad-workbench-29839c295955e4f8_bg.wasm' });


window.wasmBindings = bindings;


dispatchEvent(new CustomEvent("TrunkApplicationStarted", {detail: {wasm}}));

</script>
    
    

    <!-- Favicon/PWA assets. Only these files under assets/ are shipped; the
         shapefiles in assets/vectors/ are already baked into the binary via
         include_bytes! and must not be duplicated into dist/. -->
    
    
    
    
    

    <script>
        // Register service worker for cross-origin isolation + network monitoring.
        // If the SW is not yet controlling this page, register it and reload so
        // the COOP/COEP response headers take effect before the app loads.
        if ('serviceWorker' in navigator) {
            if (!navigator.serviceWorker.controller) {
                navigator.serviceWorker.register('service-worker.js').then(function(reg) {
                    var sw = reg.installing || reg.waiting;
                    if (sw) {
                        sw.addEventListener('statechange', function() {
                            if (sw.state === 'activated') {
                                window.location.reload();
                            }
                        });
                    } else if (reg.active) {
                        window.location.reload();
                    }
                });
            }
        }
    </script>

    <script>
        // Safe-area inset reader. The WASM app calls this each frame on mobile
        // to learn how much to pad the top and bottom chrome. Reading
        // getComputedStyle on every frame is cheap (no layout thrash — the
        // custom properties never change after initial layout unless the
        // device rotates) and avoids having to enable the CssStyleDeclaration
        // feature in web-sys.
        (function () {
            function parsePx(v) {
                var n = parseFloat(v);
                return isFinite(n) ? n : 0;
            }
            window.__nexradSafeAreaInsets = function () {
                var cs = getComputedStyle(document.documentElement);
                return {
                    top: parsePx(cs.getPropertyValue('--sa-inset-top')),
                    right: parsePx(cs.getPropertyValue('--sa-inset-right')),
                    bottom: parsePx(cs.getPropertyValue('--sa-inset-bottom')),
                    left: parsePx(cs.getPropertyValue('--sa-inset-left')),
                };
            };
        })();
    </script>

    <script>
        // Live favicon recoloring. The WASM app calls window.setFaviconColor(hex)
        // on every AppMode transition (Idle/Archive/Live) to retint the SVG.
        // The static assets/favicon.svg (orange phosphor) is the fallback for
        // browsers or contexts where live updates aren't possible — notably iOS
        // Home Screen PWAs, which cache the apple-touch-icon PNG at install time.
        (function () {
            // Colors baked into assets/favicon.svg that we replace at runtime.
            // Keep in sync with the SVG source.
            var PRIMARY_SRC   = /#ff9b2e/gi;   // grid lines, corner indicator
            var SECONDARY_SRC = /#ffc066/gi;   // N glyph fill (lighter phosphor)

            var templatePromise = fetch('assets/favicon.svg').then(function (r) { return r.text(); });

            function hexToRgb(hex) {
                var m = /^#?([0-9a-f]{6})$/i.exec(hex);
                if (!m) return null;
                var n = parseInt(m[1], 16);
                return { r: (n >> 16) & 0xff, g: (n >> 8) & 0xff, b: n & 0xff };
            }

            function rgbToHex(r, g, b) {
                function c(v) { return ('0' + Math.max(0, Math.min(255, v | 0)).toString(16)).slice(-2); }
                return '#' + c(r) + c(g) + c(b);
            }

            // Approximates the #ff9b2e → #ffc066 relationship in the source SVG
            // (roughly a 35% lerp toward white). Good enough for a 16px favicon.
            function lighten(hex, t) {
                var c = hexToRgb(hex);
                if (!c) return hex;
                return rgbToHex(
                    c.r + (255 - c.r) * t,
                    c.g + (255 - c.g) * t,
                    c.b + (255 - c.b) * t
                );
            }

            window.setFaviconColor = function (primaryHex) {
                templatePromise.then(function (svg) {
                    var secondaryHex = lighten(primaryHex, 0.35);
                    var recolored = svg
                        .replace(PRIMARY_SRC, primaryHex)
                        .replace(SECONDARY_SRC, secondaryHex);
                    var url = 'data:image/svg+xml;utf8,' + encodeURIComponent(recolored);
                    var link = document.querySelector('link[rel~="icon"][type="image/svg+xml"]');
                    if (!link) {
                        link = document.createElement('link');
                        link.rel = 'icon';
                        link.type = 'image/svg+xml';
                        document.head.appendChild(link);
                    }
                    link.href = url;
                });
            };
        })();
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* The app overrides egui's dark panel_fill to Color32::BLACK
               (main.rs: visuals.panel_fill = BLACK). Match that here so any
               sliver of body that peeks through behind the canvas (iOS PWA
               home-indicator area, fractional pixel rounding) blends with
               the app chrome. */
            background-color: #000000;
        }

        /* iOS safe-area insets exposed as CSS custom properties so the WASM
           app can read them via getComputedStyle. Needed because the canvas
           extends under the status bar / home indicator when installed as a
           PWA (viewport-fit=cover + apple-mobile-web-app-status-bar-style
           black-translucent), and egui has to compensate in its own layout. */
        :root {
            --sa-inset-top: env(safe-area-inset-top, 0px);
            --sa-inset-right: env(safe-area-inset-right, 0px);
            --sa-inset-bottom: env(safe-area-inset-bottom, 0px);
            --sa-inset-left: env(safe-area-inset-left, 0px);
        }

        #app_canvas {
            /* Anchor the canvas to every viewport edge explicitly. Previously
               using width/height: 100% left a small dark strip at the bottom
               on iOS PWAs — likely iOS rounding the body's effective pixel
               height down while the visual viewport is a hair taller. Pinning
               with position: fixed + inset: 0 side-steps containing-block
               sizing quirks and fills the screen edge-to-edge. */
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            display: block;
            width: 100%;
            height: 100%;
            /* Prevent the browser from claiming touch gestures (pinch-to-zoom,
               double-tap-to-zoom, swipe-to-scroll) so they reach egui as
               multi-touch events. */
            touch-action: none;
        }

        #loading_text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-size: 18px;
            color: #e0e0e0;
            text-align: center;
        }

        #loading_text p {
            margin: 8px 0;
        }

        .spinner {
            width: 40px;
            height: 40px;
            margin: 20px auto;
            border: 4px solid #333;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
